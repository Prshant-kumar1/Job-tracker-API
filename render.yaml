services:
  - type: web
    name: job-tracker-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: DATABASE_URL
        fromDatabase:
          name: job-tracker-db
          property: connectionString
      # Set this to your frontend's Render URL so CORS is allowed.
      # e.g. https://job-tracker-frontend.onrender.com
      - key: FRONTEND_URL
        value: https://job-tracker-frontend-sxro.onrender.com

databases:
  - name: job-tracker-db
    databaseName: job_tracker
    user: job_tracker_user
    plan: free
